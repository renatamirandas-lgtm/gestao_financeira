version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: gest_financeira_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gest_financeira
      POSTGRES_PASSWORD: gest_financeira123
      POSTGRES_DB: gest_financeira
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gest_financeira"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

